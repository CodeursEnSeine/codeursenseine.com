name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint & typecheck
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: https://codeursenseine.com

  audit:
    runs-on: ubuntu-latest
    # Informatif : ne bloque pas le merge tant que les vulnérabilités transitives
    # (chaîne Contentlayer) ne sont pas résorbées. Voir docs/AUDIT.md §1.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
